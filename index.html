<!DOCTYPE html>
<html lang="en">
<head>
    <title>Employee Form using the JPDB API</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
    <h2 class="text-center">Employee Form using the JPDB API</h2>
    <form id="empForm" method="post">
        <div class="form-group">
            <label>Employee ID:</label>
            <input type="text" class="form-control" id="empid" placeholder="Enter Employee ID">
        </div>
        <div class="form-group">
            <label>Employee Name:</label>
            <input type="text" class="form-control" id="empname" placeholder="Enter Employee Name" disabled>
        </div>
        <div class="form-group">
            <label>Basic Salary:</label>
            <input type="number" class="form-control" id="empsal" placeholder="Enter Basic Salary" disabled>
        </div>
        <div class="form-group">
            <label>HRA:</label>
            <input type="number" class="form-control" id="hra" placeholder="Enter HRA" disabled>
        </div>
        <div class="form-group">
            <label>DA:</label>
            <input type="number" class="form-control" id="da" placeholder="Enter DA" disabled>
        </div>
        <div class="form-group">
            <label>Deduction:</label>
            <input type="number" class="form-control" id="deduct" placeholder="Enter Deduction" disabled>
        </div>
        <div class="form-group text-center">
            <button type="button" class="btn btn-lg btn-primary" id="save" onclick="saveData()" disabled>Save</button>
            <button type="button" class="btn btn-lg btn-primary" id="change" onclick="changeData()" disabled>Change</button>
            <button type="button" class="btn btn-lg btn-primary" id="reset" onclick="resetForm()" disabled>Reset</button>
        </div>
    </form>
</div>
<script src="index.js"></script>
</body>
</html>
